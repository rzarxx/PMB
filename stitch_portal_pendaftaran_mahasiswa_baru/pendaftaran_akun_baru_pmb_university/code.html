<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4">
<div class="max-w-2xl w-full bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-margin-desktop md:p-8">
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-primary mb-stack-sm">PMB University</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Bergabunglah bersama kami. Lengkapi formulir pendaftaran di bawah ini.</p>
</div>
<form class="space-y-stack-lg" onsubmit="event.preventDefault(); window.location.href='../dashboard_overview_status_pendaftaran/code.html';">
<section class="space-y-stack-md">
<h2 class="font-headline-md text-headline-md text-primary border-b border-outline-variant pb-2">Informasi Akun</h2>
<div class="grid grid-cols-1 md:grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface" for="fullName">Nama Lengkap</label>
<input class="w-full rounded-DEFAULT border-outline-variant focus:border-primary focus:ring-primary bg-surface-bright font-body-md text-body-md text-on-surface placeholder:text-outline p-2 border" id="fullName" placeholder="Sesuai ijazah" type="text"/>
</div>
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface" for="whatsapp">Nomor WhatsApp</label>
<input class="w-full rounded-DEFAULT border-outline-variant focus:border-primary focus:ring-primary bg-surface-bright font-body-md text-body-md text-on-surface placeholder:text-outline p-2 border" id="whatsapp" placeholder="08xxxxxxxxxx" type="tel"/>
</div>
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface" for="email">Email</label>
<input class="w-full rounded-DEFAULT border-outline-variant focus:border-primary focus:ring-primary bg-surface-bright font-body-md text-body-md text-on-surface placeholder:text-outline p-2 border" id="email" placeholder="email@contoh.com" type="email"/>
</div>
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<input class="w-full rounded-DEFAULT border-outline-variant focus:border-primary focus:ring-primary bg-surface-bright font-body-md text-body-md text-on-surface placeholder:text-outline p-2 border" id="password" placeholder="Minimal 8 karakter" type="password"/>
</div>
</div>
</section>
<section class="space-y-stack-md">
<h2 class="font-headline-md text-headline-md text-primary border-b border-outline-variant pb-2">Minat Akademik</h2>
<div class="grid grid-cols-1 md:grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface" for="gradYear">Tahun Lulus</label>
<select class="w-full rounded-DEFAULT border-outline-variant focus:border-primary focus:ring-primary bg-surface-bright font-body-md text-body-md text-on-surface p-2 border" id="gradYear">
<option value="">Pilih Tahun Lulus</option>
<option value="2024">2024</option>
<option value="2023">2023</option>
<option value="2022">2022</option>
</select>
</div>
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface" for="admissionPath">Jalur Pendaftaran</label>
<select class="w-full rounded-DEFAULT border-outline-variant focus:border-primary focus:ring-primary bg-surface-bright font-body-md text-body-md text-on-surface p-2 border" id="admissionPath">
<option value="">Pilih Jalur</option>
<option value="mandiri">Mandiri</option>
<option value="prestasi">Prestasi</option>
<option value="kip">KIP-Kuliah</option>
</select>
</div>
<div class="space-y-stack-sm md:col-span-2">
<label class="block font-label-md text-label-md text-on-surface" for="program1">Pilihan Program Studi 1 <span class="text-error">*</span></label>
<select class="w-full rounded-DEFAULT border-outline-variant focus:border-primary focus:ring-primary bg-surface-bright font-body-md text-body-md text-on-surface p-2 border" id="program1" ="">
<option value="">Pilih Program Studi Utama</option>
<option value="cs">Teknik Informatika</option>
<option value="ba">Administrasi Bisnis</option>
<option value="ds">Desain Komunikasi Visual</option>
</select>
</div>
<div class="space-y-stack-sm md:col-span-2">
<label class="block font-label-md text-label-md text-on-surface" for="program2">Pilihan Program Studi 2 <span class="font-caption text-caption text-on-surface-variant font-normal px-2 py-0.5 bg-surface-variant rounded-full ml-2">Opsional</span></label>
<select class="w-full rounded-DEFAULT border-outline-variant focus:border-primary focus:ring-primary bg-surface-bright font-body-md text-body-md text-on-surface p-2 border opacity-90" id="program2">
<option value="">Pilih Program Studi Alternatif (Opsional)</option>
<option value="cs">Teknik Informatika</option>
<option value="ba">Administrasi Bisnis</option>
<option value="ds">Desain Komunikasi Visual</option>
</select>
</div>
</div>

                    Daftar Sekarang
                </button>
</div>

</p>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // 1. Landing Page Mobile Menu Toggle
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const topNavMenu = document.getElementById('top-nav-menu');
    const loginBtn = document.getElementById('top-login-btn');
    
    if (mobileMenuBtn && topNavMenu) {
        mobileMenuBtn.addEventListener('click', () => {
            topNavMenu.classList.toggle('hidden');
            topNavMenu.classList.toggle('flex');
            topNavMenu.classList.toggle('flex-col');
            topNavMenu.classList.toggle('absolute');
            topNavMenu.classList.toggle('top-20');
            topNavMenu.classList.toggle('left-0');
            topNavMenu.classList.toggle('w-full');
            topNavMenu.classList.toggle('bg-surface');
            topNavMenu.classList.toggle('p-4');
            topNavMenu.classList.toggle('shadow-lg');
            topNavMenu.classList.toggle('z-40');
            topNavMenu.classList.toggle('border-b');
            
            if (loginBtn) {
                loginBtn.classList.toggle('hidden');
                loginBtn.classList.toggle('flex');
                loginBtn.classList.toggle('mt-4');
                loginBtn.classList.toggle('w-full');
            }
        });
    }

    // 2. Dashboard Sidebar Toggle
    const openSidebarBtn = document.getElementById('open-sidebar-btn');
    const mobileSidebar = document.getElementById('mobile-sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    
    if (openSidebarBtn && mobileSidebar && sidebarOverlay) {
        openSidebarBtn.addEventListener('click', () => {
            mobileSidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
        });
        
        sidebarOverlay.addEventListener('click', () => {
            mobileSidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        });
    }
});
</script>
